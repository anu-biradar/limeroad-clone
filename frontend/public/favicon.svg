<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b8e636"/>
      <stop offset="100%" stop-color="#94cd00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Shopping bag outline -->
  <path d="M18 24C18 22.9 18.9 22 20 22H44C45.1 22 46 22.9 46 24V50C46 52.2 44.2 54 42 54H22C19.8 54 18 52.2 18 50V24Z" stroke="url(#accent)" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  <!-- Bag handles -->
  <path d="M25 22V18C25 14.13 28.13 11 32 11C35.87 11 39 14.13 39 18V22" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Stylized "L" letter -->
  <path d="M26 31V43H35" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Small lime/dot accent -->
  <circle cx="39" cy="36" r="3.5" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>
</svg>